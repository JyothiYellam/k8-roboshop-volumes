apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: roboshop
  labels:
      project: roboshop
      tier: db
      component: mysql
spec:
  clusterIP: None
  selector: 
    project: roboshop
    tier: db
    component: mysql
  ports: 
   - protocol: TCP
     port: 3306
     targetPort: 3306

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mysql
  serviceName: "mysql-headless"
  replicas: 1
  #replicas: 3
  #pod definition
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mysql
    spec:
      containers:
        - name: mysql
          image: jyothi023/mysql:1.0.0 
          volumeMounts:
          - name: mysql
            mountPath: /data/db
      #PVC
  volumeClaimTemplates:
   - metadata:
       name: mysql
     spec:
       accessModes: [ "ReadWriteOnce" ]
       storageClassName: "roboshop-ebs"
       resources:
         requests:
           storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
      project: roboshop
      tier: db
      component: mysql
spec:
  selector: 
    project: roboshop
    tier: db
    component: mysql
  ports: 
   - protocol: TCP
     port: 3306
     targetPort: 3306
