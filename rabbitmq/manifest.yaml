apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: roboshop
  labels:
      project: roboshop
      tier: db
      component: rabbitmq
spec:
  clusterIP: None
  selector: 
    project: roboshop
    tier: db
    component: rabbitmq
  ports: 
   - protocol: TCP
     port: 5672
     targetPort: 5672

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: rabbitmq
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: redrabbitmqis
  serviceName: "rabbitmq-headless"
  replicas: 1
  #replicas: 3
  #pod definition
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3
          volumeMounts:
          - name: rabbitmq
            mountPath: /var/lib/rabbitmq
      #PVC
  volumeClaimTemplates:
   - metadata:
       name: rabbitmq
     spec:
       accessModes: [ "ReadWriteOnce" ]
       storageClassName: "roboshop-ebs"
       resources:
         requests:
           storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
      project: roboshop
      tier: db
      component: rabbitmq
spec:
  selector: 
    project: roboshop
    tier: db
    component: rabbitmq
  ports: 
   - protocol: TCP
     port: 5672
     targetPort: 5672
